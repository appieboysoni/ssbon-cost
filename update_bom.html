window.run = async function() {
  const btn=document.getElementById('btn'), log=document.getElementById('log');
  btn.disabled=true; btn.textContent='등록 중...'; log.style.display='block'; log.innerHTML='';
  let ok=0, fail=0;
  for(const [code, data] of Object.entries(BOM)){
    try{
      await setDoc(doc(db,'bom',code), {code, name:data.name, mats:data.mats});
      log.innerHTML += `<div class="ok">✅ ${code} ${data.name} (자재 ${data.mats.length}종)</div>`;
      ok++;
    }catch(e){
      log.innerHTML += `<div class="err">❌ ${code} 실패: ${e.message}</div>`;
      fail++;
    }
    log.scrollTop=log.scrollHeight;
  }
  log.innerHTML += `<div class="done">━━━━━━━━━━<br>완료! 성공 ${ok}개 / 실패 ${fail}개</div>`;
  btn.textContent='✅ 등록 완료';
  document.getElementById('warn').style.display='block';
};
